# ============================================================================
# GleamLM-Nano 40M 配置
# ============================================================================
# 继承 base.yaml，仅覆盖差异项
extends: base.yaml

training:
  epochs: 5
  batch_size: 8
  accumulate_grad: 8
  max_train_chars: 5300000000

lr:
  type: cosine
  lr: 0.0003
  warmup_ratio: 0.01
  min_lr_ratio: 0.1

model:
  vocab_size: 12002
  d_model: 512
  num_layers: 12
  num_heads: 8
  num_kv_heads: 4
  d_ff: 1365
  max_seq_len: 1024
  dropout: 0.1
  tie_weights: true
  use_flash_attn: false
  use_qk_norm: true

data:
  tokenizer_path: ""            # 默认: {root}/gleamlm/tokenizer/checkpoints/bbpe_12k
  checkpoint_dir: ""            # 默认: {root}/checkpoints/nano
  ids_prefix: ""

advanced:
  z_loss_weight: 0.0
  bf16: false                   # nano 用 fp32

sft:
  max_seq_len: 512
  data_path: data/nano/sft/sft_data.jsonl

dpo:
  max_seq_len: 512
  data_path: data/nano/dpo/dpo_data.jsonl

data_sources:
  - {name: edu, type: text, ratio: 0.35}
  - {name: news, type: news, ratio: 0.20}
  - {name: wiki, type: text, ratio: 0.20}
  - {name: baike, type: text, ratio: 0.15}
  - {name: qa, type: qa, ratio: 0.10}
