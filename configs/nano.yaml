# ============================================================================
# GleamLM-Nano 40M 配置
# ============================================================================
# 继承 base.yaml，仅覆盖差异项
extends: base.yaml

training:
  epochs: 1
  batch_size: 8
  accumulate_grad: 8
  max_train_chars: 2600000000

lr:
  type: wsd
  lr: 0.0004
  warmup_ratio: 0.02
  stable_ratio: 0.80
  min_lr_ratio: 0.1

model:
  vocab_size: 12002
  d_model: 512
  num_layers: 12
  num_heads: 8
  num_kv_heads: 4
  d_ff: 1365
  max_seq_len: 1024
  dropout: 0.0
  tie_weights: true
  use_flash_attn: true
  use_qk_norm: true

data:
  data_dir: data/nano/pretrain
  tokenizer_path: gleamlm/tokenizer/checkpoints/bbpe_12k
  checkpoint_dir: checkpoints/nano
  ids_prefix: ""

advanced:
  z_loss_weight: 0.0001
  bf16: true                   # nano 用 bf16 防 FP16 溢出

sft:
  max_seq_len: 512
  data_path: data/nano/sft/sft_data.jsonl

dpo:
  max_seq_len: 512
  data_path: data/nano/dpo/dpo_data.jsonl

data_sources:
  - {name: edu, type: text, ratio: 0.55}
  - {name: news, type: news, ratio: 0.05}
  - {name: wiki, type: text, ratio: 0.15}
  - {name: baike, type: text, ratio: 0.10}
  - {name: qa, type: qa, ratio: 0.15}
