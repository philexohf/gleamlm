# ============================================================================
# GleamLM-Pro 126M 配置（18L×768d, GQA 12/6, SwiGLU, RoPE, QK-Norm）
# ============================================================================
extends: base.yaml

training:
  epochs: 3
  batch_size: 2
  accumulate_grad: 32

lr:
  type: wsd
  lr: 0.0003
  warmup_ratio: 0.03
  stable_ratio: 0.80
  min_lr_ratio: 0.05

model:
  vocab_size: 12002
  d_model: 768
  num_layers: 18
  num_heads: 12
  num_kv_heads: 6
  d_ff: 2048
  max_seq_len: 4096
  dropout: 0.0
  tie_weights: true
  use_flash_attn: true
  use_qk_norm: true
  use_gradient_checkpointing: true

data:
  ids_prefix: ""

advanced:
  z_loss_weight: 0.0001
  bf16: true
